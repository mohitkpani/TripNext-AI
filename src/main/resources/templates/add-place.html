<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Add Place | TripNext AI
</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Fonts -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #ede9fe
    );

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#7c3aed;

    bottom:-140px;
    right:-120px;

    opacity:0.15;
}

@keyframes float{

    0%{
        transform:
        translateY(0px);
    }

    50%{
        transform:
        translateY(-20px);
    }

    100%{
        transform:
        translateY(0px);
    }
}

/* NAVBAR */

.navbar{

    background:
    rgba(255,255,255,0.7);

    backdrop-filter:blur(18px);

    padding:18px 40px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.06);
}

.navbar-brand{

    font-size:34px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 22px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;

    margin-bottom:25px;
}

.dashboard-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* SECTION */

.form-section{

    padding:60px 20px;
}

/* FORM CARD */

.form-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    border-radius:32px;

    padding:45px;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.08);

    border:
    1px solid rgba(255,255,255,0.5);
}

.form-title{

    text-align:center;

    margin-bottom:35px;
}

.form-title h1{

    font-size:46px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.form-title p{

    color:#6b7280;

    margin-top:10px;
}

/* FORM */

.form-control{

    height:58px;

    border-radius:16px;

    margin-bottom:22px;

    border:1px solid #dbeafe;

    padding-left:18px;

    transition:0.3s;
}

.form-control:focus{

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,0.12);
}

textarea.form-control{

    height:150px;

    resize:none;

    padding-top:18px;
}

/* BUTTON */

.submit-btn{

    height:58px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    font-size:18px;

    font-weight:600;
}

/* PREVIEW */

.preview-card{

    background:white;

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    height:100%;
}

.preview-card img{

    width:100%;

    height:280px;

    object-fit:cover;
}

.preview-body{

    padding:28px;
}

.preview-body h3{

    font-size:34px;

    font-weight:700;
}

.preview-location{

    color:#6b7280;

    margin-top:10px;
}

.preview-category{

    margin-top:18px;

    display:inline-block;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    padding:10px 18px;

    border-radius:30px;

    font-weight:600;
}

.preview-description{

    margin-top:18px;

    color:#374151;

    line-height:1.7;
}

/* FOOTER */

footer{

    margin-top:70px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:45px;

    text-align:center;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/admin-dashboard">

            TripNext AI

        </a>

    </div>

</nav>

<!-- FORM SECTION -->

<section class="form-section">

    <div class="container">

        <!-- BACK BUTTON -->

        <a href="/admin-dashboard"
           class="dashboard-btn">

            <i class="bi bi-arrow-left-circle-fill"></i>

            Back To Dashboard

        </a>

        <div class="row g-5 align-items-start">

            <!-- FORM -->

            <div class="col-lg-7">

                <div class="form-card">

                    <div class="form-title">

                        <h1>
                            Add New Place
                        </h1>

                        <p>
                            Create beautiful tourist destinations for your platform
                        </p>

                    </div>

                    <form id="placeForm">

                        <!-- PLACE NAME -->

                        <input
                            type="text"
                            id="placeName"
                            class="form-control"
                            placeholder="Place Name"
                            required>

                        <!-- LOCATION -->

                        <input
                            type="text"
                            id="location"
                            class="form-control"
                            placeholder="Location"
                            required>

                        <!-- IMAGE URL -->

                        <input
                            type="text"
                            id="imageUrl"
                            class="form-control"
                            placeholder="Image URL"
                            required>

                        <!-- CATEGORY -->

                        <input
                            type="text"
                            id="category"
                            class="form-control"
                            placeholder="Category (Beach, Mountain, Adventure...)"
                            required>

                        <!-- DESCRIPTION -->

                        <textarea
                            id="description"
                            class="form-control"
                            placeholder="Place Description"
                            required></textarea>

                        <!-- BUTTON -->

                        <button
                            type="submit"
                            class="btn btn-primary w-100 submit-btn">

                            Add Place

                        </button>

                    </form>

                </div>

            </div>

            <!-- PREVIEW -->

            <div class="col-lg-5">

                <div class="preview-card">

                    <img id="previewImage"
                         src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

                    <div class="preview-body">

                        <h3 id="previewName">

                            Goa

                        </h3>

                        <p class="preview-location"
                           id="previewLocation">

                            <i class="bi bi-geo-alt-fill"></i>

                            Goa, India

                        </p>

                        <div class="preview-category"
                             id="previewCategory">

                            Beach

                        </div>

                        <p class="preview-description"
                           id="previewDescription">

                            Famous for beaches, nightlife and beautiful sunsets.

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

</footer>

<!-- SCRIPT -->

<script>

/* LIVE PREVIEW */

document.getElementById(
    "placeName"
).addEventListener(

    "input",

    function(){

        document.getElementById(
            "previewName"
        ).innerText =

        this.value ||

        "Goa";
    }
);

document.getElementById(
    "location"
).addEventListener(

    "input",

    function(){

        document.getElementById(
            "previewLocation"
        ).innerHTML =

        `<i class="bi bi-geo-alt-fill"></i>

        ${this.value || "Goa, India"}`;
    }
);

document.getElementById(
    "category"
).addEventListener(

    "input",

    function(){

        document.getElementById(
            "previewCategory"
        ).innerText =

        this.value ||

        "Beach";
    }
);

document.getElementById(
    "description"
).addEventListener(

    "input",

    function(){

        document.getElementById(
            "previewDescription"
        ).innerText =

        this.value ||

        "Famous for beaches, nightlife and beautiful sunsets.";
    }
);

document.getElementById(
    "imageUrl"
).addEventListener(

    "input",

    function(){

        document.getElementById(
            "previewImage"
        ).src =

        this.value ||

"https://images.unsplash.com/photo-1507525428034-b723cf961d3e";
    }
);

/* ADD PLACE */

document.getElementById(
    "placeForm"
).addEventListener(

    "submit",

async function(e){

    e.preventDefault();

    const place = {

        placeName:
        document.getElementById(
            "placeName"
        ).value,

        location:
        document.getElementById(
            "location"
        ).value,

        imageUrl:
        document.getElementById(
            "imageUrl"
        ).value,

        category:
        document.getElementById(
            "category"
        ).value,

        description:
        document.getElementById(
            "description"
        ).value
    };

    try{

        const response =
        await fetch(

"http://localhost:8080/api/places/add",

        {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:
            JSON.stringify(place)
        });

        if(response.ok){

            alert(
                "Place Added Successfully"
            );

            window.location.href =
            "/admin-dashboard";

        }else{

            alert(
                "Failed To Add Place"
            );
        }

    }catch(error){

        console.log(error);

        alert(
            "Something Went Wrong"
        );
    }
});

</script>

</body>

</html>
