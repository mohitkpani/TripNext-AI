<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Analytics | TripNext AI
</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Fonts -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #ede9fe
    );

    min-height:100vh;

    overflow-x:hidden;

    position:relative;

    padding:40px;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#7c3aed;

    bottom:-140px;
    right:-120px;

    opacity:0.15;
}

@keyframes float{

    0%{
        transform:
        translateY(0px);
    }

    50%{
        transform:
        translateY(-20px);
    }

    100%{
        transform:
        translateY(0px);
    }
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 22px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;

    margin-bottom:30px;
}

.dashboard-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* HEADER */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:40px;

    flex-wrap:wrap;

    gap:20px;
}

.header h1{

    font-size:48px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.admin-badge{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    padding:14px 24px;

    border-radius:30px;

    font-weight:600;

    box-shadow:
    0 10px 25px rgba(37,99,235,0.25);
}

/* STATS */

.stats-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    padding:32px;

    border-radius:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    transition:0.4s;

    height:100%;

    border:
    1px solid rgba(255,255,255,0.5);
}

.stats-card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 25px 50px rgba(37,99,235,0.18);
}

.stats-icon{

    width:75px;

    height:75px;

    border-radius:22px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;

    font-size:32px;

    margin-bottom:22px;
}

.blue{
    background:#2563eb;
}

.purple{
    background:#7c3aed;
}

.orange{
    background:#f59e0b;
}

.red{
    background:#ef4444;
}

.stats-card h2{

    font-size:42px;

    font-weight:800;

    color:#111827;
}

.stats-card p{

    color:#6b7280;

    margin-top:10px;

    font-size:17px;
}

/* SECTION */

.section-title{

    margin-top:60px;

    margin-bottom:25px;

    font-size:38px;

    font-weight:800;

    color:#111827;
}

/* TABLE */

.table-container{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    padding:30px;

    border-radius:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    border:
    1px solid rgba(255,255,255,0.5);
}

.table{

    margin-bottom:0;
}

.table img{

    width:120px;

    height:80px;

    object-fit:cover;

    border-radius:16px;
}

.table th{

    font-weight:700;

    padding:18px;

    color:#111827;
}

.table td{

    vertical-align:middle;

    padding:18px;

    color:#374151;
}

/* FOOTER */

footer{

    margin-top:80px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:45px;

    border-radius:28px;

    text-align:center;
}

footer h3{

    font-size:34px;

    font-weight:800;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- BACK BUTTON -->

<a href="/admin-dashboard"
   class="dashboard-btn">

    <i class="bi bi-arrow-left-circle-fill"></i>

    Back To Dashboard

</a>

<!-- HEADER -->

<div class="header">

    <h1>
        Analytics Dashboard
    </h1>

    <div class="admin-badge">

        TripNext Analytics

    </div>

</div>

<!-- STATS -->

<div class="row g-4">

    <!-- Hotels -->

    <div class="col-md-3">

        <div class="stats-card">

            <div class="stats-icon blue">

                <i class="bi bi-building"></i>

            </div>

            <h2 id="totalHotels">
                0
            </h2>

            <p>
                Total Hotels
            </p>

        </div>

    </div>

    <!-- Places -->

    <div class="col-md-3">

        <div class="stats-card">

            <div class="stats-icon purple">

                <i class="bi bi-globe"></i>

            </div>

            <h2 id="totalPlaces">
                0
            </h2>

            <p>
                Total Places
            </p>

        </div>

    </div>

    <!-- Users -->

    <div class="col-md-3">

        <div class="stats-card">

            <div class="stats-icon orange">

                <i class="bi bi-people"></i>

            </div>

            <h2 id="totalUsers">
                0
            </h2>

            <p>
                Total Users
            </p>

        </div>

    </div>

    <!-- Revenue -->

    <div class="col-md-3">

        <div class="stats-card">

            <div class="stats-icon red">

                <i class="bi bi-currency-rupee"></i>

            </div>

            <h2 id="revenue">
                ₹0
            </h2>

            <p>
                Total Revenue
            </p>

        </div>

    </div>

</div>

<!-- PLACE ANALYTICS -->

<h2 class="section-title">
    Place Analytics
</h2>

<div class="table-container">

    <div class="table-responsive">

        <table class="table align-middle table-hover">

            <thead>

                <tr>

                    <th>
                        Image
                    </th>

                    <th>
                        Place Name
                    </th>

                    <th>
                        Location
                    </th>

                    <th>
                        Category
                    </th>

                    <th>
                        Description
                    </th>

                </tr>

            </thead>

            <tbody id="placeTableBody">

            </tbody>

        </table>

    </div>

</div>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

</footer>

<!-- SCRIPT -->

<script>

/* LOAD ANALYTICS */

async function loadAnalytics(){

    try{

        const response =
        await fetch(
            "http://localhost:8080/api/admin/stats"
        );

        const stats =
        await response.json();

        document.getElementById(
            "totalHotels"
        ).innerText =
        stats.totalHotels || 0;

        document.getElementById(
            "totalPlaces"
        ).innerText =
        stats.totalPlaces || 0;

        document.getElementById(
            "totalUsers"
        ).innerText =
        stats.totalUsers || 0;

        document.getElementById(
            "revenue"
        ).innerText =
        "₹" + (stats.revenue || 0);

    }catch(error){

        console.log(error);
    }
}

/* LOAD PLACES */

async function loadPlaces(){

    try{

        const response =
        await fetch(
            "http://localhost:8080/api/places/all"
        );

        const places =
        await response.json();

        let data = "";

        places.forEach(place => {

            data += `

            <tr>

                <td>
                    <img src="${place.imageUrl}">
                </td>

                <td>
                    ${place.placeName}
                </td>

                <td>
                    ${place.location}
                </td>

                <td>
                    ${place.category}
                </td>

                <td>
                    ${place.description}
                </td>

            </tr>

            `;
        });

        document.getElementById(
            "placeTableBody"
        ).innerHTML = data;

    }catch(error){

        console.log(error);
    }
}

loadAnalytics();
loadPlaces();

</script>

</body>

</html>
