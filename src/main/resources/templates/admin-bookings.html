<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Bookings | TripNext AI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f3f7ff,
        #ede9fe
    );

    overflow-x:hidden;

    position:relative;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#7c3aed;

    bottom:-140px;
    right:-120px;

    opacity:0.15;
}

@keyframes float{

    0%{
        transform:
        translateY(0px);
    }

    50%{
        transform:
        translateY(-20px);
    }

    100%{
        transform:
        translateY(0px);
    }
}

/* NAVBAR */

.navbar{

    background:
    rgba(255,255,255,0.7);

    backdrop-filter:blur(18px);

    padding:18px 40px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.06);
}

.navbar-brand{

    font-size:34px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 22px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;

    margin-bottom:30px;
}

.dashboard-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* HEADER */

.page-title{

    padding:40px 0 20px;
}

.page-title h1{

    font-size:52px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* BOOKING CARD */

.booking-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    border-radius:32px;

    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    transition:0.4s;

    height:100%;

    border:
    1px solid rgba(255,255,255,0.5);
}

.booking-card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 25px 50px rgba(37,99,235,0.18);
}

.booking-card img{

    width:100%;

    height:250px;

    object-fit:cover;
}

.booking-body{

    padding:28px;
}

.booking-title{

    font-size:32px;

    font-weight:700;

    color:#111827;
}

.booking-info{

    margin-top:20px;
}

.booking-info p{

    margin-bottom:12px;

    color:#374151;

    font-size:16px;
}

.booking-info strong{

    color:#111827;
}

/* STATUS */

.status{

    display:inline-block;

    margin-top:18px;

    background:
    linear-gradient(
        135deg,
        #10b981,
        #059669
    );

    color:white;

    padding:10px 18px;

    border-radius:30px;

    font-size:14px;

    font-weight:700;

    box-shadow:
    0 8px 20px rgba(16,185,129,0.25);
}

/* FOOTER */

footer{

    margin-top:80px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:45px;

    border-radius:28px 28px 0 0;

    text-align:center;
}

footer h3{

    font-size:34px;

    font-weight:800;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/admin-dashboard">

            TripNext AI

        </a>

    </div>

</nav>

<!-- CONTENT -->

<div class="container pt-5">

    <!-- BACK BUTTON -->

    <a href="/admin-dashboard"
       class="dashboard-btn">

        <i class="bi bi-arrow-left-circle-fill"></i>

        Back To Dashboard

    </a>

    <!-- TITLE -->

    <div class="page-title">

        <h1>
            All Bookings
        </h1>

    </div>

    <!-- BOOKINGS -->

    <div class="row g-4 pb-5"
         id="bookingContainer">

    </div>

</div>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

async function loadBookings(){

    try{

        const response =
        await fetch(
            "/api/bookings/all"
        );

        const bookings =
        await response.json();

        const container =
        document.getElementById(
            "bookingContainer"
        );

        container.innerHTML = "";

        bookings.forEach(booking => {

            container.innerHTML += `

            <div class="col-lg-4 col-md-6">

                <div class="booking-card">

                    <img src="${booking.hotel.imageUrl}">

                    <div class="booking-body">

                        <h3 class="booking-title">

                            ${booking.hotel.hotelName}

                        </h3>

                        <div class="booking-info">

                            <p>

                                <strong>
                                User:
                                </strong>

                                ${booking.user.name}

                            </p>

                            <p>

                                <strong>
                                Email:
                                </strong>

                                ${booking.user.email}

                            </p>

                            <p>

                                <strong>
                                Check In:
                                </strong>

                                ${booking.checkInDate}

                            </p>

                            <p>

                                <strong>
                                Check Out:
                                </strong>

                                ${booking.checkOutDate}

                            </p>

                            <p>

                                <strong>
                                Guests:
                                </strong>

                                ${booking.numberOfGuests}

                            </p>

                        </div>

                        <div class="status">

                            Confirmed

                        </div>

                    </div>

                </div>

            </div>

            `;
        });

    }catch(error){

        console.log(error);

        alert(
            "Failed to load bookings"
        );
    }
}

loadBookings();

</script>

</body>

</html>
