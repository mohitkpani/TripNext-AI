<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Bookings | TripNext AI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #eef2ff
    );

    overflow-x:hidden;

    position:relative;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#9333ea;

    bottom:-150px;
    right:-120px;

    opacity:0.15;
}

.circle3{

    width:250px;
    height:250px;

    background:#06b6d4;

    top:45%;
    left:45%;

    opacity:0.12;
}

@keyframes float{

    0%{
        transform:
        translateY(0px)
        translateX(0px);
    }

    50%{
        transform:
        translateY(-20px)
        translateX(20px);
    }

    100%{
        transform:
        translateY(0px)
        translateX(0px);
    }
}

/* NAVBAR */

.navbar{

    background:
    rgba(255,255,255,0.7);

    backdrop-filter:blur(18px);

    padding:18px 45px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.06);
}

.navbar-brand{

    font-size:36px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #9333ea
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* HERO */

.hero{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #4f46e5,
        #7c3aed
    );

    color:white;

    padding:90px 0;

    border-bottom-left-radius:50px;
    border-bottom-right-radius:50px;

    text-align:center;

    box-shadow:
    0 15px 40px rgba(37,99,235,0.25);
}

.hero h1{

    font-size:58px;

    font-weight:800;
}

.hero p{

    margin-top:15px;

    font-size:20px;

    opacity:0.95;
}

/* SECTION */

.section{

    padding:80px 0;
}

/* BOOKING CARD */

.booking-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    border-radius:35px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.08);

    transition:0.4s;

    position:relative;
}

.booking-card:hover{

    transform:
    translateY(-10px)
    scale(1.01);

    box-shadow:
    0 30px 60px rgba(37,99,235,0.18);
}

.booking-card img{

    width:100%;

    height:280px;

    object-fit:cover;
}

.booking-body{

    padding:30px;
}

.booking-title{

    font-size:34px;

    font-weight:700;
}

.booking-location{

    color:#6b7280;

    margin-top:10px;

    font-size:17px;
}

/* INFO */

.booking-info{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:15px;

    margin-top:28px;
}

.info-box{

    background:#f1f5f9;

    padding:18px;

    border-radius:18px;

    text-align:center;
}

.info-box h6{

    color:#2563eb;

    margin-bottom:10px;

    font-size:14px;
}

.price{

    margin-top:25px;

    font-size:42px;

    font-weight:800;

    color:#2563eb;
}

.price span{

    font-size:20px;

    color:#6b7280;
}

/* BUTTONS */

.booking-actions{

    display:flex;

    gap:15px;

    margin-top:30px;
}

.booking-actions a,
.booking-actions button{

    flex:1;

    height:55px;

    border:none;

    border-radius:16px;

    font-weight:600;

    display:flex;

    align-items:center;

    justify-content:center;

    text-decoration:none;
}

.btn-primary{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    border:none;
}

.btn-danger{

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    border:none;
}

/* STATUS */

.status-badge{

    position:absolute;

    top:20px;
    right:20px;

    background:#10b981;

    color:white;

    padding:10px 20px;

    border-radius:30px;

    font-size:14px;

    font-weight:600;
}

/* EMPTY */

.empty-box{

    background:white;

    padding:70px;

    border-radius:30px;

    text-align:center;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.06);
}

.empty-box i{

    font-size:80px;

    color:#2563eb;
}

/* FOOTER */

footer{

    margin-top:80px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:50px;

    text-align:center;
}

footer h3{

    font-size:34px;

    font-weight:800;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="bg-circle circle3"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/user-dashboard">

            TripNext AI

        </a>

    </div>

</nav>

<!-- HERO -->

<section class="hero">

    <div class="container">

        <h1>
            My Bookings 📖
        </h1>

        <p>
            View and manage all your hotel reservations.
        </p>

    </div>

</section>

<!-- BOOKINGS -->

<section class="section">

    <div class="container">

        <div class="row g-4"
             id="bookingContainer">

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

    <p style="margin-top:15px;">

        Developed By Mohit Kumar Pani

    </p>

</footer>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* USER */

const user =
JSON.parse(localStorage.getItem("user"));

/* CHECK LOGIN */

if(!user){

    window.location.href =
    "/login";
}

/* LOAD BOOKINGS */

async function loadBookings(){

    try{

        const response =
        await fetch(
            `http://localhost:8080/api/bookings/user/${user.id}`
        );

        const bookings =
        await response.json();

        const container =
        document.getElementById(
            "bookingContainer"
        );

        container.innerHTML = "";

        /* NO BOOKINGS */

        if(bookings.length === 0){

            container.innerHTML = `

            <div class="col-12">

                <div class="empty-box">

                    <i class="bi bi-journal-x"></i>

                    <h2 class="mt-4">
                        No Bookings Found
                    </h2>

                    <p class="mt-3 text-muted">
                        Start booking hotels and your trips will appear here.
                    </p>

                    <a href="/hotels"
                       class="btn btn-primary mt-4 px-5 py-3">

                        Explore Hotels

                    </a>

                </div>

            </div>

            `;

            return;
        }

        /* SHOW BOOKINGS */

        bookings.forEach(booking => {

            container.innerHTML += `

            <div class="col-lg-6">

                <div class="booking-card">

                    <div class="status-badge">

                        Confirmed

                    </div>

                    <img src="${booking.hotel.imageUrl}">

                    <div class="booking-body">

                        <h2 class="booking-title">

                            ${booking.hotel.hotelName}

                        </h2>

                        <p class="booking-location">

                            <i class="bi bi-geo-alt-fill"></i>

                            ${booking.hotel.location}

                        </p>

                        <div class="booking-info">

                            <div class="info-box">

                                <h6>
                                    Check In
                                </h6>

                                <strong>
                                    ${booking.checkInDate}
                                </strong>

                            </div>

                            <div class="info-box">

                                <h6>
                                    Check Out
                                </h6>

                                <strong>
                                    ${booking.checkOutDate}
                                </strong>

                            </div>

                            <div class="info-box">

                                <h6>
                                    Guests
                                </h6>

                                <strong>
                                    ${booking.numberOfGuests}
                                </strong>

                            </div>

                        </div>

                        <div class="price">

                            ₹${booking.hotel.price}

                            <span>/night</span>

                        </div>

                        <div class="booking-actions">

                            <a href="/hotel-details?id=${booking.hotel.id}"
                               class="btn btn-primary">

                               View Hotel

                            </a>

                            <button class="btn btn-danger"
                                    onclick="cancelBooking(${booking.id})">

                               Cancel Booking

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            `;
        });

    }catch(error){

        console.log(error);

        alert("Failed to load bookings");
    }
}

/* CANCEL BOOKING */

async function cancelBooking(id){

    const confirmCancel =
    confirm("Cancel this booking?");

    if(!confirmCancel){

        return;
    }

    try{

        const response =
        await fetch(
            `http://localhost:8080/api/bookings/delete/${id}`,
            {
                method:"DELETE"
            }
        );

        if(response.ok){

            alert("Booking Cancelled!");

            location.reload();

        }else{

            alert("Failed To Cancel Booking");
        }

    }catch(error){

        console.log(error);

        alert("Something went wrong!");
    }
}

/* LOAD */

loadBookings();

</script>

</body>

</html>
