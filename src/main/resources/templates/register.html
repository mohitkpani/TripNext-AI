<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | TripNext AI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:

                    linear-gradient(
                            rgba(0,0,0,0.5),
                            rgba(0,0,0,0.5)
                    ),

                    url('https://images.unsplash.com/photo-1493558103817-58b2924bce98');

            background-size:cover;
            background-position:center;

            padding:20px;
        }

        .register-container{

            width:100%;
            max-width:450px;

            background:
                    rgba(255,255,255,0.15);

            backdrop-filter:blur(15px);

            padding:40px;

            border-radius:20px;

            border:
                    1px solid rgba(255,255,255,0.2);

            box-shadow:
                    0 8px 32px rgba(0,0,0,0.25);

            color:white;
        }

        .register-container h2{

            text-align:center;

            font-weight:700;

            margin-bottom:10px;
        }

        .register-container p{

            text-align:center;

            color:#dbeafe;

            margin-bottom:30px;
        }

        .form-control{

            height:52px;

            border-radius:12px;

            border:none;

            margin-bottom:20px;
        }

        .btn-register{

            width:100%;

            height:52px;

            border-radius:12px;

            font-size:18px;
            font-weight:600;
        }

        .login-link{

            text-align:center;

            margin-top:20px;
        }

        .login-link a{

            color:#93c5fd;

            text-decoration:none;

            font-weight:500;
        }

        .login-link a:hover{

            text-decoration:underline;
        }

        .back-home{

            text-align:center;

            margin-top:15px;
        }

        .back-home a{

            color:white;

            text-decoration:none;

            font-size:14px;
        }

        .back-home a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="register-container">

    <h2>
        Create Account
    </h2>

    <p>
        Start your travel journey with TripNext AI
    </p>

    <form id="registerForm">

        <input type="text"
               id="name"
               class="form-control"
               placeholder="Enter Full Name"
               required>

        <input type="email"
               id="email"
               class="form-control"
               placeholder="Enter Email"
               required>

        <input type="password"
               id="password"
               class="form-control"
               placeholder="Enter Password"
               required>

        <button type="submit"
                class="btn btn-primary btn-register">

            Register

        </button>

    </form>

    <div class="login-link">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

    <div class="back-home">

        <a href="/">
            ← Back to Home
        </a>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Register JavaScript -->

<script>

    document.getElementById("registerForm")
    .addEventListener("submit", async function(event){

        event.preventDefault();

        const name =
        document.getElementById("name").value;

        const email =
        document.getElementById("email").value;

        const password =
        document.getElementById("password").value;

        try{

            const response = await fetch(
                "/api/users/register",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body: JSON.stringify({

                        name:name,
                        email:email,
                        password:password
                    })
                }
            );

            const data = await response.json();

            if(data && data.id){

                alert("Registration Successful!");

                window.location.href="/login";

            }else{

                alert("Registration Failed!");
            }

        }catch(error){

            alert("Something went wrong!");
        }

    });

</script>

</body>

</html>
