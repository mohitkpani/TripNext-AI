<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Place Details | TripNext AI
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #ede9fe
    );

    overflow-x:hidden;
}

/* HERO */

.hero{

    width:100%;

    height:70vh;

    overflow:hidden;

    position:relative;
}

.hero img{

    width:100%;

    height:100%;

    object-fit:cover;

    transform:scale(1.05);
}

.overlay{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.6)
    );

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    color:white;
}

.overlay h1{

    font-size:72px;

    font-weight:800;

    text-shadow:
    0 6px 20px rgba(0,0,0,0.3);
}

.overlay p{

    font-size:24px;

    margin-top:15px;
}

/* SECTION */

.section{

    padding:80px 0;
}

/* CARD */

.details-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    padding:38px;

    border-radius:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    margin-bottom:30px;

    border:
    1px solid rgba(255,255,255,0.5);
}

.details-card h2{

    font-size:36px;

    font-weight:800;

    margin-bottom:24px;

    color:#111827;
}

.details-card p{

    color:#4b5563;

    line-height:1.9;

    font-size:17px;
}

/* CATEGORY */

.category{

    display:inline-block;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    padding:12px 22px;

    border-radius:30px;

    font-weight:700;

    margin-top:20px;
}

/* BUTTON */

.back-btn{

    margin-top:28px;

    border:none;

    border-radius:16px;

    padding:14px 28px;

    font-size:17px;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    transition:0.3s;

    text-decoration:none;

    display:inline-flex;

    align-items:center;

    gap:10px;
}

.back-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* WEATHER */

.weather-card{

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #1e3a8a
    );

    color:white;
}

.weather-card p{

    color:white;
}

/* MAP */

.map-frame{

    width:100%;

    height:450px;

    border:none;

    border-radius:22px;
}

/* QUICK INFO */

.quick-info p{

    margin-bottom:18px;
}

/* FOOTER */

footer{

    margin-top:60px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:50px;

    text-align:center;
}

footer h3{

    font-size:36px;

    font-weight:800;
}

footer p{

    margin-top:15px;
}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">

    <img
        id="placeImage"
        src="">

    <div class="overlay">

        <div>

            <h1 id="placeName">
                Loading...
            </h1>

            <p id="placeLocation">

            </p>

        </div>

    </div>

</section>

<!-- DETAILS -->

<section class="section">

    <div class="container">

        <div class="row g-4">

            <!-- LEFT -->

            <div class="col-lg-8">

                <!-- ABOUT -->

                <div class="details-card">

                    <h2>
                        About This Place
                    </h2>

                    <p id="placeDescription">

                    </p>

                    <div
                        class="category"
                        id="placeCategory">

                    </div>

                    <!-- BACK BUTTON -->

                    <div>

                        <a href="/explore-places"
                           class="back-btn">

                            <i class="bi bi-arrow-left-circle-fill"></i>

                            Back To Explore Places

                        </a>

                    </div>

                </div>

                <!-- MAP -->

                <div class="details-card">

                    <h2>
                        Location Map
                    </h2>

                    <iframe
                        id="mapFrame"
                        class="map-frame"
                        loading="lazy">

                    </iframe>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="col-lg-4">

                <!-- WEATHER -->

                <div
                    class="details-card weather-card">

                    <h2>
                        Live Weather
                    </h2>

                    <h3 id="weatherTemp">
                        Loading...
                    </h3>

                    <p id="weatherCondition">

                    </p>

                    <p id="weatherHumidity">

                    </p>

                </div>

                <!-- QUICK INFO -->

                <div class="details-card quick-info">

                    <h2>
                        Quick Info
                    </h2>

                    <p>

                        <strong>
                            Best Time:
                        </strong>

                        October to March

                    </p>

                    <p>

                        <strong>
                            Popular For:
                        </strong>

                        Tourism & Adventure

                    </p>

                    <p>

                        <strong>
                            Travel Type:
                        </strong>

                        Family & Friends

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        Explore • Travel • Discover
    </p>

    <p>

        Developed By Mohit Kumar Pani

    </p>

</footer>

<!-- SCRIPT -->

<script>

/* GET PLACE ID */

const params =
new URLSearchParams(
    window.location.search
);

const placeId =
params.get("id");

/* LOAD PLACE DETAILS */

async function loadPlaceDetails(){

    try{

        const response =
        await fetch(

"/api/places/" + placeId

        );

        const place =
        await response.json();

        /* PLACE DATA */

        document.getElementById(
            "placeImage"
        ).src =
        place.imageUrl;

        document.getElementById(
            "placeName"
        ).innerText =
        place.placeName;

        document.getElementById(
            "placeLocation"
        ).innerHTML =

        `<i class="bi bi-geo-alt-fill"></i>
         ${place.location}`;

        document.getElementById(
            "placeDescription"
        ).innerText =
        place.description;

        document.getElementById(
            "placeCategory"
        ).innerText =
        place.category;

        /* GOOGLE MAP */

        document.getElementById(
            "mapFrame"
        ).src =

`https://maps.google.com/maps?q=${place.location}&t=&z=10&ie=UTF8&iwloc=&output=embed`;

        /* WEATHER API */

        const apiKey =
        "c2fd72a3fd160833da9c5230b472a9f9";

        const weatherResponse =
        await fetch(

`https://api.openweathermap.org/data/2.5/weather?q=${place.placeName}&appid=${apiKey}&units=metric`

        );

        const weatherData =
        await weatherResponse.json();

        if(weatherData.cod != 200){

            document.getElementById(
                "weatherTemp"
            ).innerText =
            "Weather Unavailable";

        }else{

            document.getElementById(
                "weatherTemp"
            ).innerText =

            weatherData.main.temp + "°C";

            document.getElementById(
                "weatherCondition"
            ).innerText =

            weatherData.weather[0].description;

            document.getElementById(
                "weatherHumidity"
            ).innerText =

            "Humidity: " +

            weatherData.main.humidity + "%";
        }

    }catch(error){

        console.log(error);

        document.getElementById(
            "weatherTemp"
        ).innerText =
        "Weather Unavailable";
    }
}

/* LOAD */

loadPlaceDetails();

</script>

</body>

</html>
