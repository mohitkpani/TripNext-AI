<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | TripNext AI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(
                            135deg,
                            #2563eb,
                            #1e3a8a,
                            #111827
                    );
        }

        .login-container{

            width:100%;
            max-width:450px;

            background:white;

            border-radius:30px;

            padding:45px;

            box-shadow:
                    0 20px 50px rgba(0,0,0,0.2);
        }

        .logo{

            text-align:center;

            margin-bottom:35px;
        }

        .logo h1{

            font-size:42px;
            font-weight:700;

            color:#2563eb;
        }

        .logo p{

            color:#6b7280;

            margin-top:8px;
        }

        .form-control{

            height:55px;

            border-radius:14px;

            margin-bottom:20px;

            border:1px solid #dbeafe;
        }

        .login-btn{

            height:55px;

            border-radius:14px;

            font-size:18px;
            font-weight:600;

            margin-top:10px;
        }

        .bottom-text{

            text-align:center;

            margin-top:25px;

            color:#6b7280;
        }

        .bottom-text a{

            text-decoration:none;

            font-weight:600;
        }

    </style>

</head>

<body>

<div class="login-container">

    <!-- Logo -->

    <div class="logo">

        <h1>
            TripNext AI
        </h1>

        <p>
            Login to continue your journey
        </p>

    </div>

    <!-- Login Form -->

    <input type="email"
           id="email"
           class="form-control"
           placeholder="Enter Email">

    <input type="password"
           id="password"
           class="form-control"
           placeholder="Enter Password">

    <!-- Button -->

    <button class="btn btn-primary w-100 login-btn"
            onclick="loginUser()">

        Login

    </button>

    <!-- Bottom -->

    <div class="bottom-text">

        Don't have an account?

        <a href="/register">
            Register
        </a>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript -->

<script>

    async function loginUser(){

        const email =
        document.getElementById("email").value;

        const password =
        document.getElementById("password").value;

        try{

            const response = await fetch(
                "http://localhost:8080/api/users/login",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body: JSON.stringify({

                        email:email,
                        password:password
                    })
                }
            );

            if(response.ok){

                const user =
                await response.json();

                alert("Login Successful!");

                // STORE USER

                localStorage.setItem(
                    "user",
                    JSON.stringify(user)
                );

                // ROLE BASED LOGIN

                if(user.role === "ADMIN"){

                    window.location.href="/admin";

                }else{

                    window.location.href="/dashboard";
                }

            }else{

                alert("Invalid Credentials!");
            }

        }catch(error){

            console.log(error);

            alert("Something went wrong!");
        }
    }

</script>

</body>

</html>
