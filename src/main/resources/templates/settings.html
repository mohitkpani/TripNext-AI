<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Settings | TripNext AI
</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Fonts -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f3f7ff,
        #ede9fe
    );

    overflow-x:hidden;

    position:relative;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#7c3aed;

    bottom:-140px;
    right:-120px;

    opacity:0.15;
}

@keyframes float{

    0%{
        transform:
        translateY(0px);
    }

    50%{
        transform:
        translateY(-20px);
    }

    100%{
        transform:
        translateY(0px);
    }
}

/* NAVBAR */

.navbar{

    background:
    rgba(255,255,255,0.7);

    backdrop-filter:blur(18px);

    padding:18px 40px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.06);
}

.navbar-brand{

    font-size:34px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 22px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;

    margin-bottom:30px;
}

.dashboard-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* SETTINGS SECTION */

.settings-section{

    padding:60px 20px;
}

/* SETTINGS CARD */

.settings-card{

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    border-radius:32px;

    padding:45px;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.08);

    border:
    1px solid rgba(255,255,255,0.5);
}

/* TITLE */

.page-title{

    font-size:52px;

    font-weight:800;

    margin-bottom:35px;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.settings-heading{

    font-size:26px;

    font-weight:700;

    margin-bottom:30px;

    color:#111827;
}

/* FORM */

.form-control{

    height:58px;

    border-radius:16px;

    margin-bottom:22px;

    border:1px solid #dbeafe;

    padding-left:18px;

    transition:0.3s;

    font-size:16px;
}

.form-control:focus{

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,0.12);
}

/* BUTTONS */

.btn-save{

    height:58px;

    border:none;

    border-radius:16px;

    font-size:18px;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;
}

.btn-save:hover{

    transform:
    translateY(-2px);

    opacity:0.95;
}

.logout-btn{

    margin-top:22px;

    height:58px;

    border:none;

    border-radius:16px;

    font-size:18px;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    transition:0.3s;
}

.logout-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;
}

/* SETTINGS ICON */

.settings-icon{

    width:90px;

    height:90px;

    border-radius:24px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:40px;

    margin-bottom:25px;

    box-shadow:
    0 10px 25px rgba(37,99,235,0.25);
}

/* FOOTER */

footer{

    margin-top:80px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:45px;

    border-radius:28px 28px 0 0;

    text-align:center;
}

footer h3{

    font-size:34px;

    font-weight:800;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/admin-dashboard">

            TripNext AI

        </a>

    </div>

</nav>

<!-- SETTINGS -->

<section class="settings-section">

    <div class="container">

        <!-- BACK BUTTON -->

        <a href="/admin-dashboard"
           class="dashboard-btn">

            <i class="bi bi-arrow-left-circle-fill"></i>

            Back To Dashboard

        </a>

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="settings-card">

                    <!-- ICON -->

                    <div class="settings-icon">

                        <i class="bi bi-gear-fill"></i>

                    </div>

                    <!-- TITLE -->

                    <h1 class="page-title">

                        Settings

                    </h1>

                    <h4 class="settings-heading">

                        Admin Settings

                    </h4>

                    <!-- FORM -->

                    <form>

                        <!-- EMAIL -->

                        <input
                        type="email"
                        class="form-control"
                        placeholder="Admin Email">

                        <!-- PASSWORD -->

                        <input
                        type="password"
                        class="form-control"
                        placeholder="New Password">

                        <!-- CONFIRM PASSWORD -->

                        <input
                        type="password"
                        class="form-control"
                        placeholder="Confirm Password">

                        <!-- SAVE BUTTON -->

                        <button
                        type="submit"
                        class="btn btn-primary w-100 btn-save">

                            Save Changes

                        </button>

                        <!-- LOGOUT -->

                        <a href="/logout"
                        class="btn btn-danger w-100 logout-btn">

                            Logout

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

</footer>

</body>

</html>
