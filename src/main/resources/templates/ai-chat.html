<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
TripNext AI Assistant
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        to bottom right,
        #111827,
        #1e3a8a,
        #312e81
    );

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;
}

.chat-container{

    width:95%;

    max-width:900px;

    height:90vh;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:30px;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.4);
}

/* Header */

.chat-header{

    padding:22px 30px;

    background:
    rgba(255,255,255,0.08);

    border-bottom:
    1px solid rgba(255,255,255,0.1);

    color:white;

    display:flex;

    align-items:center;

    gap:15px;
}

.chat-header i{

    font-size:32px;

    color:#60a5fa;
}

.chat-header h2{

    font-size:28px;

    font-weight:700;

    margin:0;
}

/* Chat Box */

.chat-box{

    flex:1;

    padding:25px;

    overflow-y:auto;
}

/* Messages */

.message{

    max-width:75%;

    padding:16px 20px;

    border-radius:18px;

    margin-bottom:18px;

    line-height:1.8;

    font-size:15px;

    animation:fadeIn 0.3s ease;

    white-space:pre-wrap;
}

.user-message{

    background:#2563eb;

    color:white;

    margin-left:auto;

    border-bottom-right-radius:5px;
}

.ai-message{

    background:white;

    color:#111827;

    border-bottom-left-radius:5px;
}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(10px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

/* Input Area */

.chat-input{

    padding:20px;

    background:
    rgba(255,255,255,0.08);

    display:flex;

    gap:15px;
}

.chat-input input{

    flex:1;

    height:58px;

    border:none;

    border-radius:16px;

    padding:0 20px;

    font-size:16px;

    outline:none;
}

.send-btn{

    width:65px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:24px;

    transition:0.3s;
}

.send-btn:hover{

    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="chat-container">

    <!-- Header -->

    <div class="chat-header">

        <i class="bi bi-robot"></i>

        <h2>
            TripNext AI Assistant
        </h2>

    </div>

    <!-- Chat Messages -->

    <div class="chat-box"
         id="chatBox">

        <div class="message ai-message">

Hello 👋

I am TripNext AI.

Ask me about:
• hotels
• travel
• tourism
• weather
• places to visit
• restaurants
• maps
• destinations ✈️

        </div>

    </div>

    <!-- Input -->

    <div class="chat-input">

        <input
            type="text"
            id="userInput"
            placeholder="Ask TripNext AI anything...">

        <button
            class="send-btn"
            onclick="sendMessage()">

            <i class="bi bi-send-fill"></i>

        </button>

    </div>

</div>

<!-- JavaScript -->

<script>

async function sendMessage(){

    const input =
    document.getElementById(
        "userInput"
    );

    const message =
    input.value.trim();

    if(message === "") return;

    const chatBox =
    document.getElementById(
        "chatBox"
    );

    // USER MESSAGE

    chatBox.innerHTML += `

    <div class="message user-message">

        ${message}

    </div>

    `;

    input.value = "";

    chatBox.scrollTop =
    chatBox.scrollHeight;

    try{

        const response =
        await fetch(
            "/api/ai/chat",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:message
                })
            }
        );

        const aiReply =
        await response.text();

        // AI MESSAGE

        chatBox.innerHTML += `

        <div class="message ai-message">

            ${aiReply}

        </div>

        `;

        chatBox.scrollTop =
        chatBox.scrollHeight;

    }catch(error){

        console.log(error);

        chatBox.innerHTML += `

        <div class="message ai-message">

            Error connecting to AI.

        </div>

        `;
    }
}

</script>

</body>

</html>
