<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manage Hotels | TripNext AI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #eef4ff,
        #f8fbff,
        #ede9fe
    );

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* BACKGROUND */

.bg-circle{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;

    animation:
    float 10s infinite ease-in-out;
}

.circle1{

    width:350px;
    height:350px;

    background:#2563eb;

    top:-120px;
    left:-100px;

    opacity:0.18;
}

.circle2{

    width:400px;
    height:400px;

    background:#7c3aed;

    bottom:-140px;
    right:-120px;

    opacity:0.15;
}

@keyframes float{

    0%{
        transform:
        translateY(0px);
    }

    50%{
        transform:
        translateY(-20px);
    }

    100%{
        transform:
        translateY(0px);
    }
}

/* NAVBAR */

.navbar{

    background:
    rgba(255,255,255,0.7);

    backdrop-filter:blur(18px);

    padding:18px 40px;

    box-shadow:
    0 8px 30px rgba(0,0,0,0.06);
}

.navbar-brand{

    font-size:34px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* DASHBOARD BUTTON */

.dashboard-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 22px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    transition:0.3s;

    margin-bottom:25px;
}

.dashboard-btn:hover{

    transform:
    translateY(-2px);

    opacity:0.95;

    color:white;
}

/* HEADER */

.page-header{

    text-align:center;

    padding:50px 20px 20px;
}

.page-header h1{

    font-size:52px;

    font-weight:800;

    background:
    linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.page-header p{

    color:#6b7280;

    margin-top:10px;

    font-size:17px;
}

/* HOTEL CARD */

.hotel-card{

    border:none;

    border-radius:30px;

    overflow:hidden;

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(18px);

    box-shadow:
    0 15px 40px rgba(0,0,0,0.08);

    transition:0.4s;

    height:100%;
}

.hotel-card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 25px 50px rgba(37,99,235,0.18);
}

.hotel-card img{

    width:100%;
    height:260px;

    object-fit:cover;
}

.hotel-body{

    padding:28px;
}

.hotel-name{

    font-size:30px;

    font-weight:700;

    color:#111827;
}

.hotel-location{

    color:#6b7280;

    margin-top:10px;

    font-size:16px;
}

.hotel-price{

    color:#2563eb;

    font-size:34px;

    font-weight:700;

    margin-top:18px;
}

.hotel-rating{

    margin-top:10px;

    color:#f59e0b;

    font-weight:600;
}

.hotel-description{

    margin-top:18px;

    color:#4b5563;

    line-height:1.7;
}

/* BUTTONS */

.hotel-actions{

    margin-top:28px;

    display:flex;

    gap:15px;
}

.hotel-actions a,
.hotel-actions button{

    border:none;

    border-radius:14px;

    font-weight:600;

    height:50px;

    display:flex;

    align-items:center;

    justify-content:center;
}

.btn-warning{

    background:
    linear-gradient(
        135deg,
        #f59e0b,
        #f97316
    );

    color:white;
}

.btn-danger{

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    color:white;
}

/* FOOTER */

footer{

    margin-top:80px;

    background:
    linear-gradient(
        to right,
        #111827,
        #1e3a8a,
        #4f46e5
    );

    color:white;

    padding:45px;

    text-align:center;
}

footer h3{

    font-size:34px;

    font-weight:800;
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/admin-dashboard">

            TripNext AI

        </a>

    </div>

</nav>

<!-- HEADER -->

<div class="container pt-5">

    <a href="/admin-dashboard"
       class="dashboard-btn">

        <i class="bi bi-arrow-left-circle-fill"></i>

        Back To Dashboard

    </a>

</div>

<div class="page-header">

    <h1>
        Manage Hotels
    </h1>

    <p>
        Edit and manage all hotel listings from admin panel
    </p>

</div>

<!-- HOTELS -->

<div class="container pb-5">

    <div class="row g-4"
         id="hotelContainer">

    </div>

</div>

<!-- FOOTER -->

<footer>

    <h3>
        TripNext AI
    </h3>

    <p>
        AI Powered Travel & Hotel Booking Platform
    </p>

</footer>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JAVASCRIPT -->

<script>

async function loadHotels(){

    try{

        const response =
        await fetch(
            "/api/hotels/all"
        );

        const hotels =
        await response.json();

        const container =
        document.getElementById(
            "hotelContainer"
        );

        container.innerHTML = "";

        hotels.forEach(hotel => {

            container.innerHTML += `

            <div class="col-lg-4 col-md-6">

                <div class="hotel-card">

                    <img src="${hotel.imageUrl}">

                    <div class="hotel-body">

                        <h3 class="hotel-name">

                            ${hotel.hotelName}

                        </h3>

                        <p class="hotel-location">

                            <i class="bi bi-geo-alt-fill"></i>

                            ${hotel.location}

                        </p>

                        <div class="hotel-price">

                            ₹${hotel.price} / night

                        </div>

                        <div class="hotel-rating">

                            ⭐ ${hotel.rating} Rating

                        </div>

                        <p class="hotel-description">

                            ${hotel.description}

                        </p>

                        <div class="hotel-actions">

                            <a href="/edit-hotel?id=${hotel.id}"
                               class="btn btn-warning flex-fill">

                                Edit

                            </a>

                            <button class="btn btn-danger flex-fill"
                                    onclick="deleteHotel(${hotel.id})">

                                Delete

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            `;
        });

    }catch(error){

        console.log(error);

        alert("Failed to load hotels");
    }
}

/* DELETE HOTEL */

async function deleteHotel(id){

    const confirmDelete =
    confirm("Delete this hotel?");

    if(!confirmDelete){

        return;
    }

    try{

        const response =
        await fetch(

`/api/hotels/delete/${id}`,

        {

            method:"DELETE",

            headers:{
                "Content-Type":
                "application/json"
            }
        });

        if(response.ok){

            alert(
                "Hotel Deleted Successfully!"
            );

            loadHotels();

        }else{

            alert(
                "Failed To Delete Hotel"
            );
        }

    }catch(error){

        console.log(error);

        alert(
            "Something went wrong!"
        );
    }
}

/* LOAD */

loadHotels();

</script>

</body>

</html>
